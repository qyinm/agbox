name: Publish npm package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish @agboxhq/cli
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Test
        run: go test ./...

      - name: Build macOS arm64 binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$VERSION" == "$GITHUB_REF" ]]; then
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          VERSION="${VERSION#v}"
          GOOS=darwin GOARCH=arm64 go build -trimpath \
            -ldflags "-s -w -X github.com/hippoom/agbox/internal/telemetry.Version=${VERSION}" \
            -o npm/cli/dist/agbox-darwin-arm64 ./cmd/agbox
          chmod +x npm/cli/bin/agbox npm/cli/dist/agbox-darwin-arm64
          strings npm/cli/dist/agbox-darwin-arm64 | grep -q "${VERSION}"

      - name: Bundle telemetry env
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          if [[ -n "${POSTHOG_API_KEY}" ]]; then
            umask 077
            printf 'POSTHOG_API_KEY=%s\nPOSTHOG_HOST=https://us.i.posthog.com\n' "${POSTHOG_API_KEY}" > npm/cli/telemetry.env
          else
            echo "POSTHOG_API_KEY secret not set; npm publish will ship without bundled telemetry credentials"
          fi

      - name: Verify npm package
        working-directory: npm/cli
        run: |
          node bin/agbox --help
          npm pack --dry-run

      - name: Publish npm package
        working-directory: npm/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
